name: sehatalert
description: "A new Flutter project."
version: 1.0.0+1
environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.3
  flutter_native_splash: ^2.4.7
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1
  firebase_storage: ^13.0.5
  device_preview: ^1.3.1
  intl: ^0.20.2
  shimmer: ^3.0.0
  shared_preferences: ^2.5.4
  uuid: ^4.5.2
  record: ^6.2.0
  permission_handler: ^11.3.1
  geolocator: ^13.0.2
  http: ^1.2.2
  path_provider: ^2.1.4
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  alarm: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  intl_utils: ^2.8.13

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/logo/

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/logo/splash.jpg
  android: true
  ios: true
  web: false
  android_12:
    color: "#FFFFFF"
    image: assets/logo/splash.jpg